name: Build Android APK

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
  # Also run on every push to main/master (optional)
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo layout (debug)
        run: |
          echo "## Repo root contents:"
          ls -la
          echo ""
          echo "## frontend/ contents (if exists):"
          ls -la frontend 2>/dev/null || echo "  (no frontend/ at root)"
          echo ""
          echo "## yarn.lock locations:"
          find . -name "yarn.lock" -not -path "*/node_modules/*" | head -5
          echo ""
          echo "## package.json locations:"
          find . -name "package.json" -not -path "*/node_modules/*" -maxdepth 3 | head -5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Use pre-installed Android SDK
        run: |
          echo "Pre-installed SDK at: $ANDROID_HOME"
          echo "Available platforms:"
          ls "$ANDROID_HOME/platforms" 2>/dev/null || echo "  (none)"
          echo "Available build-tools:"
          ls "$ANDROID_HOME/build-tools" 2>/dev/null || echo "  (none)"
          # Accept all SDK licenses non-interactively (just in case)
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React production bundle
        working-directory: frontend
        env:
          # Inject the deployed backend URL at build time
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'https://smart-content-pub.preview.emergentagent.com' }}
        run: yarn build

      - name: Sync web assets into Android project
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ads-studio-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK build summary
        run: |
          echo "## ✅ APK Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above (named \`ads-studio-debug-apk\`)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install it on your Android phone:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the artifact ZIP" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract the \`app-debug.apk\` file" >> $GITHUB_STEP_SUMMARY
          echo "3. Send to your phone via WhatsApp / Google Drive / USB" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap the APK → Install (allow 'Unknown sources' if asked)" >> $GITHUB_STEP_SUMMARY
          ls -lh frontend/android/app/build/outputs/apk/debug/
