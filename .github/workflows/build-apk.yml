name: Build Android APK

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
  # Also run on every push to main/master (optional)
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK (with API 37)
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-37
            build-tools;35.0.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React production bundle
        working-directory: frontend
        env:
          # Inject the deployed backend URL at build time
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'https://smart-content-pub.preview.emergentagent.com' }}
        run: yarn build

      - name: Sync web assets into Android project
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ads-studio-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK build summary
        run: |
          echo "## ✅ APK Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above (named \`ads-studio-debug-apk\`)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install it on your Android phone:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the artifact ZIP" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract the \`app-debug.apk\` file" >> $GITHUB_STEP_SUMMARY
          echo "3. Send to your phone via WhatsApp / Google Drive / USB" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap the APK → Install (allow 'Unknown sources' if asked)" >> $GITHUB_STEP_SUMMARY
          ls -lh frontend/android/app/build/outputs/apk/debug/
